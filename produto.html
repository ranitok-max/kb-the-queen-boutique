<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto | KB The Queen Boutique</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">Envio disponível para Reino Unido, Portugal e Europa</div>
  <header class="header">
    <a class="logo" href="index.html"><span class="logo-mark">KB</span><span>THE QUEEN BOUTIQUE</span></a>
    <a class="cart-link" href="carrinho.html">Carrinho <span id="cartCount">0</span></a>
  </header>

  <main class="product-page">
    <div class="product-gallery">
      <img id="productImage" src="" alt="Produto" />
    </div>

    <div class="product-detail">
      <p class="eyebrow dark">KB THE QUEEN BOUTIQUE</p>
      <h1 id="productName"></h1>
      <p class="product-price" id="productPrice"></p>
      <p id="productDescription"></p>

      <label for="size">Tamanho</label>
      <select id="size">
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
        <option>XXL</option>
      </select>

      <button id="addButton" class="btn primary full">Adicionar ao carrinho</button>
      <a id="whatsappProduct" class="btn whatsapp full" href="#" target="_blank" rel="noopener">Encomendar pelo WhatsApp</a>

      <div class="details-box">
        <h3>Informações</h3>
        <p>Confirma sempre a disponibilidade, tamanho e prazo de entrega antes do pagamento.</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    renderProductPage();
  </script>
</body>
</html>
